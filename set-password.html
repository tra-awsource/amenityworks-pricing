<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set access password · AmenityWorks</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      background: #0c100e;
      color: #e8f2ec;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    .card {
      max-width: 28rem;
      margin: 0 auto;
      background: #1a2420;
      border: 1px solid #2e3d36;
      border-radius: 14px;
      padding: 1.25rem;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { color: #8fa398; font-size: 0.9rem; line-height: 1.45; }
    label { display: block; font-size: 0.8rem; color: #8fa398; margin: 0.75rem 0 0.3rem; }
    input {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid #2e3d36;
      background: #0c100e;
      color: #e8f2ec;
    }
    button {
      margin-top: 0.85rem;
      width: 100%;
      min-height: 2.75rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      background: #4ecf8a;
      color: #06140c;
      cursor: pointer;
      font-size: 1rem;
    }
    code, pre {
      display: block;
      background: #0c100e;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.75rem;
      word-break: break-all;
      white-space: pre-wrap;
      border: 1px solid #2e3d36;
    }
    .ok { color: #4ecf8a; font-weight: 600; }
    a { color: #4ecf8a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create password hash</h1>
    <p>
      Type your new shared password. You get a hash only — you <strong>cannot</strong> reverse it later.
      Save the password in a password manager. Paste the hash into <code>access-config.js</code> and push to GitHub.
    </p>
    <label for="pw">New password</label>
    <input id="pw" type="password" autocomplete="new-password" />
    <label for="pw2">Confirm password</label>
    <input id="pw2" type="password" autocomplete="new-password" />
    <button type="button" id="go">Generate hash</button>
    <p id="msg"></p>
    <label>Hash (copy this)</label>
    <pre id="out">—</pre>
    <label>Replace passwordHash in access-config.js with:</label>
    <pre id="snippet">—</pre>
    <p><a href="index.html">← Back to hub</a> (you’ll need the current password if locked)</p>
  </div>
  <script>
    async function sha256Hex(text) {
      const data = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(buf))
        .map((b) => b.toString(16).padStart(2, "0"))
        .join("");
    }
    document.getElementById("go").onclick = async () => {
      const a = document.getElementById("pw").value;
      const b = document.getElementById("pw2").value;
      const msg = document.getElementById("msg");
      if (!a) {
        msg.textContent = "Enter a password.";
        msg.className = "";
        return;
      }
      if (a !== b) {
        msg.textContent = "Passwords do not match.";
        msg.className = "";
        return;
      }
      if (a.length < 8) {
        msg.textContent = "Use at least 8 characters.";
        msg.className = "";
        return;
      }
      const hex = await sha256Hex(a);
      document.getElementById("out").textContent = hex;
      document.getElementById("snippet").textContent =
        '  passwordHash:\n    "' + hex + '",';
      msg.textContent = "Hash ready. Copy it, update access-config.js, git push. Remember your password — you cannot undo the hash.";
      msg.className = "ok";
    };
  </script>
</body>
</html>
